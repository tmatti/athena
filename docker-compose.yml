services:
  app:
    build: .
    ports:
      - "8080:8080"
    # .env must exist (copy .env.example to .env and fill in secrets).
    env_file: .env
    environment:
      DATABASE_URL: postgres://athena:athena@db:5432/athena?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: athena
      POSTGRES_PASSWORD: athena
      POSTGRES_DB: athena
    ports:
      - "5432:5432"
    volumes:
      - athena-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U athena -d athena"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  athena-data:
